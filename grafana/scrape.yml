global:
  scrape_interval: 15s
  scrape_timeout: 15s

# Файлы с таргетами генерируются при запуске 01-victoria.sh из CLUSTER_HOSTS и YDB_MON_PORTS:
#   /etc/prometheus/ydbd-mon.yml     — все хосты × все порты из YDB_MON_PORTS (по умол. 8765,8767,8768)
#   /etc/prometheus/ydbd-storage.yml — YDB_MON_PD_PORT (порт мониторинга узла хранения, по умол. 8765), для pdisks/vdisks
#
# Формат (несколько групп в одном файле для ydbd-mon.yml):
#   - targets:
#       - host:port
#     labels:
#       container: ydb-static | ydb-dynamic
#       mon_port: "8765"
#       database: /Root/db1

scrape_configs:
  - job_name: node
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        regex: ([^:]+)(:[0-9]+)?
        replacement: ${1}
        target_label: instance
    file_sd_configs:
      - files:
          - /etc/prometheus/node-exporter.yml

  - job_name: ydb/auth
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: /counters/counters=auth/prometheus
    metric_relabel_configs:
      - source_labels: ["__name__"]
        target_label: "__name__"
        replacement: "auth_$1"
    relabel_configs:
      - source_labels: [__address__]
        regex: ([^:]+)(:[0-9]+)?
        replacement: ${1}
        target_label: instance
    file_sd_configs:
      - files:
          - /etc/prometheus/ydbd-mon.yml

